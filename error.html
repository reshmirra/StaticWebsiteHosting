<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Reshmi Raman Portfolio</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --text-color: #333;
            --light-bg: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-bg);
            color: var(--text-color);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .error-container {
            background: white;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
        }

        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: var(--primary-color);
            margin: 0;
            line-height: 1;
        }

        .error-message {
            font-size: 1.5rem;
            color: var(--accent-color);
            margin: 20px 0;
            font-weight: 600;
        }

        p {
            margin-bottom: 30px;
            color: #666;
        }

        .back-home {
            display: inline-block;
            padding: 12px 25px;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
            font-weight: 600;
        }

        .back-home:hover {
            background-color: #2980b9;
        }

        .terminal-icon {
            font-family: 'Courier New', Courier, monospace;
            background: #2c3e50;
            color: #2ecc71;
            padding: 10px;
            border-radius: 5px;
            display: inline-block;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="error-container">
    <div class="terminal-icon">
        $ status --check-deployment
    </div>
    <h1 class="error-code">404</h1>
    <p class="error-message">Pipeline Interrupted: Page Not Found</p>
    <p>The requested infrastructure component or page does not exist in our current environment.</p>
    <a href="index.html" class="back-home">Return to Main Resume</a>
</div>

</body>
</html>
